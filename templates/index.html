<html>
<head>
    <title>Emotion Detection NLP</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <script src="{{ url_for('static', filename='mywebscript.js') }}"></script>
    <style>
        .center-heading {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-body">
            <h1 class="center-heading">Emotion Detection NLP</h1> 
            <div style="padding: 25px;">
             <h2 class="mb-3">
                <label class="form-label">Please enter the text to be analyzed</label>
                <textarea class="form-control" id="textToAnalyze" rows="4"></textarea>           
             </h2>

             <div style="padding: 25px;">
                <button type = "button" onclick="RunEmotionDetection()" class="btn btn-primary">Run Emotion Detection</button>
             </div>
             <h2 class="mb-3">
                <label class="form-label">Result of Emotion Detection</label>
             </h2>
             <div id="system_response" style="padding: 25px;"></div>
            </div>
        </div>
    </div>
</body>
</html>
